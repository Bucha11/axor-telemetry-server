services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: axor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: axor_telemetry
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "axor"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://axor:${POSTGRES_PASSWORD}@postgres:5432/axor_telemetry
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
      # Expanded by the datasource provisioning file.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Tell Grafana it is served behind a reverse proxy on HTTPS.
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}/
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      TELEMETRY_DOMAIN: ${TELEMETRY_DOMAIN}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN}
      LANDING_DOMAIN: ${LANDING_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./landing:/srv/landing:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - grafana

volumes:
  pg_data:
  grafana_data:
  caddy_data:
  caddy_config:

apiVersion: 1

datasources:
  - name: axor-telemetry
    type: postgres
    access: proxy
    url: postgres:5432
    database: axor_telemetry
    user: axor
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
    isDefault: true
    editable: true
